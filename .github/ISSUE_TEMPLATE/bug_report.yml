name: Bug Report
description: Report a bug in x-rpc
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure ...
        2. Start provider with ...
        3. Call service ...
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Runtime environment details.
      placeholder: |
        - x-rpc version: 0.1.0
        - JDK version: 1.8.0_xxx
        - OS: macOS / Linux / Windows
        - ZooKeeper version: 3.8.x
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack trace
      description: Relevant log output or stack traces.
      render: shell
    validations:
      required: false
